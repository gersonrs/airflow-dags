name: CI

on:
  pull_request:

permissions:
  id-token: write
  packages: write
  contents: write
  pull-requests: write
  attestations: write

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check files using the black formatter
        uses: rickstaa/action-black@v1
        id: action_black
        with:
          black_args: ". --check --diff --config pyproject.toml"
      - name: Create Pull Request
        if: steps.action_black.outputs.is_formatted == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Format Python code with psf/black push"
          commit-message: ":art: Format Python code with psf/black"
          body: |
            There appear to be some python formatting errors in ${{ github.sha }}. This pull request
            uses the [psf/black](https://github.com/psf/black) formatter to fix these issues.
          base: ${{ github.head_ref }}
          branch: actions/black

  flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9
      - name: flake8 Lint
        uses: py-actions/flake8@v1
        with:
          args: "--config=.flake8"

  # mypy:
  #   # or specify a path!
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: mypy check
  #       uses: jpetrucciani/mypy-check@master
  #       with:
  #         path: '.'

  tests:
    runs-on: ubuntu-latest
    needs: [black, flake8]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"
      - name: Install poetry
        run: |
          python -m pip install poetry==1.7.1

      - name: Configure poetry
        run: |
          python -m poetry config virtualenvs.in-project true

      - name: Cache the virtualenv
        uses: actions/cache@v2
        with:
          path: ./.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          python -m poetry install

      - name: Run tests
        run: |
          python -m poetry run python -m pytest -sxv

  adjust-imports:
    runs-on: ubuntu-latest
    needs: [black, flake8, tests]
    steps:
      - uses: actions/checkout@v4
      - run: find dags/ -type f -name '*.py' -exec sed -i 's/from dags./from /g' {} \; -ls
      # This step avoids a commit for each previous step and instead commits everything on a single commit
      - name: "Commit changes done in the previous steps"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "refactor(bot): refactor files"
