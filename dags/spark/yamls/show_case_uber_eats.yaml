apiVersion: sparkoperator.k8s.io/v1beta2
version: v1beta2
kind: SparkApplication
apiGroup: sparkoperator.k8s.io
metadata:
  name: "{{ params.spark_job_name }}-{{ ds_nodash }}"
  labels:
    date: "{{ task_instance_key_str }}"
  namespace: processing
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: gersonrs/spark:v1.4.1
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///repo/airflow-dags.git/dags/spark/jobs/{{ params.spark_file }}"
  sparkVersion: 3.5.0
  timeToLiveSeconds: 3600
  restartPolicy:
    type: OnFailure
    onFailureRetries: 1
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  hadoopConf:
    fs.s3a.endpoint: "http://minio.minio.svc.cluster.local:9000"
    fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    fs.s3a.path.style.access: "True"
    fs.s3a.connection.ssl.enabled: "false"
    fs.s3a.fast.upload: "true"
    fs.s3a.aws.credentials.provider: "com.amazonaws.auth.EnvironmentVariableCredentialsProvider"
  sparkConf:
    spark.delta.logStore.class: "org.apache.spark.sql.delta.storage.S3SingleDriverLogStore"
    spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
    spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"
    spark.sql.catalogImplementation: "hive"
    spark.hive.metastore.uris: "thrift://hive-metastore.metastore.svc.cluster.local:9083"
    spark.sql.execution.arrow.pyspark.enabled: "true"
    spark.sql.warehouse.dir: "s3a://warehouse/"
  volumes:
    - name: work-dir
      emptyDir: {}
  # dynamicAllocation:
  #   enabled: true
  #   initialExecutors: 1
  #   maxExecutors: 5
  #   minExecutors: 1
  driver:
    cores: {{ params.spark_driver_cores }}
    memory: "{{ params.spark_driver_memory }}"
    labels:
      version: 3.5.0
    serviceAccount: default
    terminationGracePeriodSeconds: 360
    envSecretKeyRefs:
      AWS_ACCESS_KEY_ID:
        name: minio-secret
        key: access-key
      AWS_SECRET_ACCESS_KEY:
        name: minio-secret
        key: secret-access-key
    secrets:
      - name: git-creds
        path: /etc/git-secret
        secretType: Generic
    volumeMounts:
      - name: work-dir
        mountPath: /repo
    initContainers:
      - name: git-sync
        image: k8s.gcr.io/git-sync/git-sync:v4.2.4
        args:
          - --repo=git@github.com:GersonRS/airflow-dags.git
          - --root=/repo
          - --ref=develop
          - --one-time
          - --depth=5
        volumeMounts:
          - name: work-dir
            mountPath: /repo
          - name: git-creds-volume
            mountPath: /etc/git-secret
  executor:
    cores: {{ params.spark_executor_cores }}
    instances: {{ params.spark_executor_instances }}
    memory: "{{ params.spark_executor_memory }}"
    labels:
      version: 3.5.0
    serviceAccount: default
    envSecretKeyRefs:
      AWS_ACCESS_KEY_ID:
        name: minio-secret
        key: access-key
      AWS_SECRET_ACCESS_KEY:
        name: minio-secret
        key: secret-access-key
    volumeMounts:
      - name: work-dir
        mountPath: /repo
